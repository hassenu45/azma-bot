<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أزما | تيشيرت ثلاثي الأبعاد</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0a0c; color: #fff; font-family: 'Tajawal', sans-serif; }
    #c { width: 100vw; height: 100vh; display: block; }
    .bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: center; padding: 1rem;
      background: linear-gradient(180deg, rgba(11,10,12,0.85), transparent);
      pointer-events: none;
    }
    .bar a {
      position: absolute; right: 1.5rem; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem; font-weight: 500; pointer-events: auto; padding: 0.4rem 1rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; transition: all 0.3s;
    }
    .bar a:hover { color: #d4a84b; border-color: rgba(212,168,75,0.3); }
    .bar span {
      font-size: 1.3rem; font-weight: 900;
      background: linear-gradient(135deg, #fff, #d4a84b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hint {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      z-index: 10; padding: 0.6rem 1.5rem;
      background: rgba(11,10,12,0.7); border-radius: 50px;
      border: 1px solid rgba(212,168,75,0.1);
      color: rgba(255,255,255,0.4); font-size: 0.8rem;
      pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="bar">
    <a href="index.html">← العودة</a>
    <span>أزمـا</span>
  </div>
  <div id="c"></div>
  <div class="hint">🖱 سحب للتدوير &nbsp;·&nbsp; 🔍 تكبير وتصغير</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    (function(){
      var c = document.getElementById('c');
      var s = new THREE.Scene();
      s.background = new THREE.Color(0x0b0a0c);

      var w = Math.max(c.clientWidth, 1);
      var h = Math.max(c.clientHeight, 1);
      var cam = new THREE.PerspectiveCamera(40, w/h, 0.1, 1000);
      cam.position.set(2, 1.5, 3.5);

      var r = new THREE.WebGLRenderer({ antialias: true });
      r.setSize(w, h); r.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      c.appendChild(r.domElement);

      var o = new THREE.OrbitControls(cam, r.domElement);
      o.enableDamping = true; o.dampingFactor = 0.08;
      o.autoRotate = true; o.autoRotateSpeed = 2;
      o.minDistance = 1.5; o.maxDistance = 8;
      o.target.set(0, 0.3, 0); o.update();

      s.add(new THREE.AmbientLight(0x404060, 0.5));
      var kl = new THREE.DirectionalLight(0xffeedd, 2.5); kl.position.set(2,3,2); s.add(kl);
      var fl = new THREE.DirectionalLight(0x8888ff, 0.8); fl.position.set(-2,1,1); s.add(fl);
      var rl = new THREE.DirectionalLight(0xffdd88, 1.5); rl.position.set(0,-1,-3); s.add(rl);
      var tl = new THREE.DirectionalLight(0xffffff, 0.6); tl.position.set(0,4,0); s.add(tl);



      // === Build t-shirt procedurally ===
      function buildShirt() {
        var g = new THREE.Group();
        var dark = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.05, side: THREE.DoubleSide });
        var gold = new THREE.MeshStandardMaterial({ color: 0xd4a84b, roughness: 0.2, metalness: 0.8 });
        var gold2 = new THREE.MeshStandardMaterial({ color: 0xd4a84b, roughness: 0.2, metalness: 0.8 });

        // Body
        var shape = new THREE.Shape();
        shape.moveTo(-0.5, 0);
        shape.quadraticCurveTo(-0.55, 0.15, -0.5, 0.3);
        shape.lineTo(-0.4, 0.9);
        shape.quadraticCurveTo(-0.35, 1.15, -0.12, 1.3);
        shape.lineTo(-0.12, 1.45);
        shape.quadraticCurveTo(-0.08, 1.55, 0, 1.55);
        shape.quadraticCurveTo(0.08, 1.55, 0.12, 1.45);
        shape.lineTo(0.12, 1.3);
        shape.quadraticCurveTo(0.35, 1.15, 0.4, 0.9);
        shape.lineTo(0.5, 0.3);
        shape.quadraticCurveTo(0.55, 0.15, 0.5, 0);
        var ext = { depth: 0.25, bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.02, bevelSegments: 5 };
        var body = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, ext), dark);
        body.position.set(0, -0.3, -0.125);
        g.add(body);

        // Sleeves
        function makeSleeve(sx, sz) {
          var sh = new THREE.Shape();
          sh.moveTo(0,0); sh.quadraticCurveTo(0.3,0.05,0.35,0.2); sh.quadraticCurveTo(0.3,0.38,0,0.38);
          var mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(sh, {depth:0.25, bevelEnabled:true, bevelThickness:0.02, bevelSize:0.015, bevelSegments:3}), dark);
          mesh.position.set(sx, 0.95, sz);
          mesh.rotation.z = sz > 0 ? -0.2 : 0.2;
          return mesh;
        }
        g.add(makeSleeve(0.5, -0.125));
        g.add(makeSleeve(-0.5, -0.125));

        // Collar
        var col = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.035, 8, 16), gold);
        col.position.set(0, 1.3, 0.02); g.add(col);

        // Gold trim chest
        var t1 = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.02, 0.26), gold2);
        t1.position.set(0, 0.65, 0.02); g.add(t1);
        var t2 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.02, 0.26), gold2);
        t2.position.set(0, 0.08, 0.02); g.add(t2);
        var t3 = new THREE.Mesh(new THREE.BoxGeometry(0.02, 1.0, 0.27), gold2);
        t3.position.set(0, 0.6, 0.02); g.add(t3);

        return g;
      }

      var shirt = buildShirt();
      s.add(shirt);

      window.addEventListener('resize', function() {
        cam.aspect = c.clientWidth / c.clientHeight;
        cam.updateProjectionMatrix();
        r.setSize(c.clientWidth, c.clientHeight);
      });

      r.domElement.addEventListener('pointerdown', function() { o.autoRotate = false; });
      r.domElement.addEventListener('pointerup', function() { setTimeout(function() { o.autoRotate = true; }, 4000); });

      function anim() { requestAnimationFrame(anim); o.update(); r.render(s, cam); }
      anim();
    })();
  </script>
</body>
</html>
