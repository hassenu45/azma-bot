<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أزما | معاينة الطاقية 3D</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="order-form.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0a0c; color: #fff; font-family: 'Tajawal', sans-serif; }
    #c { width: 100vw; height: 100vh; display: block; }
    .bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: center; padding: 1rem;
      background: linear-gradient(180deg, rgba(11,10,12,0.85), transparent);
      pointer-events: none;
    }
    .bar a {
      position: absolute; right: 1.5rem; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem; font-weight: 500; pointer-events: auto; padding: 0.4rem 1rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 50px; transition: all 0.3s;
    }
    .bar a:hover { color: #d4a84b; border-color: rgba(212,168,75,0.3); }
    .bar span {
      font-size: 1.3rem; font-weight: 900;
      background: linear-gradient(135deg, #fff, #d4a84b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #ld {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0b0a0c; gap: 1rem; transition: opacity 0.5s;
    }
    #ld.hide { opacity: 0; pointer-events: none; }
    .sp { width: 40px; height: 40px; border: 3px solid rgba(212,168,75,0.1); border-top-color: #d4a84b; border-radius: 50%; animation: spin 0.8s linear infinite; }
    #lt { font-size: 1rem; color: #d4a84b; font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="ld">
    <div class="sp"></div>
    <div id="lt">جاري تحميل الطاقية...</div>
  </div>
  <div class="bar">
    <a href="index.html">← العودة</a>
    <span>أزمـا</span>
  </div>
  <div id="c"></div>
  <button class="order-fab" id="orderBtn">🛒 إرسال الطلب</button>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="order-form.js"></script>
  <script>
    (function(){
      var c = document.getElementById('c');
      var ld = document.getElementById('ld');
      var lt = document.getElementById('lt');
      var s = new THREE.Scene();
      s.background = new THREE.Color(0x0b0a0c);

      var w = Math.max(c.clientWidth, 1);
      var h = Math.max(c.clientHeight, 1);
      var cam = new THREE.PerspectiveCamera(35, w/h, 0.1, 1000);
      cam.position.set(2.5, 1.8, 3.5);

      var r = new THREE.WebGLRenderer({ antialias: true });
      r.setSize(w, h); r.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      c.appendChild(r.domElement);

      var o = new THREE.OrbitControls(cam, r.domElement);
      o.enableDamping = true; o.dampingFactor = 0.1;
      o.autoRotate = false;
      o.minDistance = 1.5; o.maxDistance = 8;
      o.minPolarAngle = Math.PI / 2;
      o.maxPolarAngle = Math.PI / 2;
      o.target.set(0, 0.3, 0); o.update();

      s.add(new THREE.AmbientLight(0x404060, 0.6));
      var kl = new THREE.DirectionalLight(0xffeedd, 2.5); kl.position.set(2,3,2); s.add(kl);
      var fl = new THREE.DirectionalLight(0x8888ff, 0.8); fl.position.set(-2,1,1); s.add(fl);
      var rl = new THREE.DirectionalLight(0xffdd88, 1.5); rl.position.set(0,-1,-3); s.add(rl);
      var tl = new THREE.DirectionalLight(0xffffff, 0.5); tl.position.set(0,4,0); s.add(tl);

      var current = null;
      var loader = new THREE.GLTFLoader();

      function buildCap() {
        var g = new THREE.Group();
        var pts = [];
        for (var i = 0; i <= 24; i++) {
          var t = i / 24, a = t * Math.PI / 2;
          pts.push(new THREE.Vector2(0.85*Math.cos(a), 0.65*Math.sin(a)));
        }
        g.add(new THREE.Mesh(new THREE.LatheGeometry(pts, 36),
          new THREE.MeshStandardMaterial({ color:0x1a1a1a, roughness:0.8, metalness:0.05, side:THREE.DoubleSide })));
        var inner = new THREE.Mesh(new THREE.LatheGeometry(pts, 36),
          new THREE.MeshStandardMaterial({ color:0x2a2a2a, roughness:0.9, metalness:0, side:THREE.BackSide }));
        inner.scale.set(0.96,0.96,0.96); g.add(inner);
        var rim = new THREE.Mesh(new THREE.TorusGeometry(0.85,0.05,10,40),
          new THREE.MeshStandardMaterial({ color:0x333333, roughness:0.5 }));
        rim.position.y = 0.01; rim.rotation.x = Math.PI/2; g.add(rim);
        var btn = new THREE.Mesh(new THREE.SphereGeometry(0.055,14,10),
          new THREE.MeshStandardMaterial({ color:0x444444, roughness:0.6 }));
        btn.position.set(0,0.67,0); g.add(btn);
        var box = new THREE.Box3().setFromObject(g);
        if (!box.isEmpty()) {
          var ctr = box.getCenter(new THREE.Vector3());
          var sz = box.getSize(new THREE.Vector3());
          var sc = 2.0 / Math.max(sz.x,sz.y,sz.z);
          g.scale.set(sc,sc,sc);
          g.position.sub(ctr.clone().multiplyScalar(sc));
          g.position.y += 0.15;
        }
        s.add(g); current = g; ld.classList.add('hide');
      }

      function loadGLB(path) {
        ld.classList.remove('hide');
        lt.textContent = 'جاري تحميل الطاقية...';
        if (current) { s.remove(current); current = null; }
        loader.load(path,
          function(gltf) {
            var obj = gltf.scene;
            var box = new THREE.Box3().setFromObject(obj);
            if (!box.isEmpty()) {
              var c = box.getCenter(new THREE.Vector3());
              var sz = box.getSize(new THREE.Vector3());
              var sc = 1.8 / Math.max(sz.x,sz.y,sz.z);
              obj.scale.set(sc,sc,sc); obj.position.sub(c.clone().multiplyScalar(sc)); obj.position.y += 0.1;
            }
            s.add(obj); current = obj; ld.classList.add('hide');
          },
          undefined,
          function() { buildCap(); }
        );
      }

      loadGLB('KAT/highres.glb');

      window.addEventListener('resize', function() {
        cam.aspect = c.clientWidth / c.clientHeight;
        cam.updateProjectionMatrix();
        r.setSize(c.clientWidth, c.clientHeight);
      });
      r.domElement.addEventListener('pointerdown', function() { o.enableDamping = true; });

      document.getElementById('orderBtn').addEventListener('click', function() {
        openOrderModal(r.domElement.toDataURL());
      });

      function anim() { requestAnimationFrame(anim); o.update(); r.render(s, cam); }
      anim();
    })();
  </script>
</body>
</html>
